name: pos_app
description: Aplikasi POS modern untuk UMKM dan Kafe
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  fluttertoast: ^8.2.4

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  blue_thermal_printer: ^1.2.3
  permission_handler: ^11.3.0
  csv: ^6.0.0
  share_plus: ^10.1.0

  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
