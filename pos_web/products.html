<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produk — POS App</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Manajemen Produk</h1>
        <p class="page-subtitle" id="product-count"></p>
      </div>
      <button class="btn btn-primary" onclick="showProductForm()">+ Tambah Produk</button>
    </div>

    <!-- Toolbar -->
    <div style="padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center">
      <div class="search-wrap" style="max-width:320px">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" class="form-control"
               placeholder="Cari produk..." oninput="onSearch(this.value)">
      </div>
      <div class="chips-row" id="category-chips"></div>
    </div>

    <!-- Table -->
    <div class="page-body">
      <div class="card" style="padding:0">
        <div class="table-wrap">
          <table id="product-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Produk</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="product-tbody">
              <tr><td colspan="7" class="loading-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Product Form Modal (dynamic) -->
<div id="toast-container" class="toast-container"></div>
<script src="assets/js/app.js"></script>
<script>
  if (!requireAuth()) throw new Error('Not auth');
  document.getElementById('sidebar').innerHTML = renderSidebar('products.html');

  let editProductId = null;
  let filterCat     = null;
  let searchQ       = '';

  async function init() {
    await Promise.all([loadCategories(), loadProducts()]);
    renderTable();
    renderCategoryChips('category-chips', null, selectCat);
  }

  function selectCat(id) {
    filterCat = id;
    loadProducts(searchQ, id).then(() => {
      renderTable();
      renderCategoryChips('category-chips', id, selectCat);
    });
  }

  let timer;
  function onSearch(v) {
    searchQ = v;
    clearTimeout(timer);
    timer = setTimeout(() => loadProducts(v, filterCat).then(renderTable), 300);
  }

  function renderTable() {
    const tbody = document.getElementById('product-tbody');
    document.getElementById('product-count').textContent = `${State.products.length} produk ditemukan`;

    if (!State.products.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-secondary)">Tidak ada produk</td></tr>';
      return;
    }

    tbody.innerHTML = State.products.map((p, i) => {
      const lowStock = p.stock <= (p.low_stock_threshold || 5);
      return `
        <tr>
          <td style="color:var(--text-secondary)">${i + 1}</td>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:40px;height:40px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">
                ${p.image_url && !p.image_url.includes('no-image')
                  ? `<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px" onerror="this.parentNode.textContent='🍽️'">`
                  : '🍽️'}
              </div>
              <div>
                <div style="font-weight:600">${p.name}</div>
                <div style="font-size:12px;color:var(--text-secondary)">${p.description || '-'}</div>
              </div>
            </div>
          </td>
          <td>${p.category?.name || '-'}</td>
          <td style="font-weight:600;color:var(--primary)">${fmt(p.price)}</td>
          <td>
            <span class="badge ${p.stock === 0 ? 'badge-error' : lowStock ? 'badge-warning' : 'badge-success'}">
              ${p.stock}
            </span>
          </td>
          <td><span class="badge ${p.is_active ? 'badge-success' : 'badge-error'}">${p.is_active ? 'Aktif' : 'Nonaktif'}</span></td>
          <td>
            <div style="display:flex;gap:6px">
              <button class="btn btn-sm btn-outline" onclick="showProductForm(${p.id})">✏️ Edit</button>
              <button class="btn btn-sm btn-danger" onclick="confirmDelete(${p.id}, '${p.name}')">🗑️</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  function showProductForm(productId = null) {
    editProductId = productId;
    const product = productId ? State.products.find(p => p.id === productId) : null;
    const catOptions = State.categories.map(c =>
      `<option value="${c.id}" ${product?.category_id === c.id ? 'selected' : ''}>${c.name}</option>`
    ).join('');

    const body = `
      <form id="product-form" onsubmit="submitProduct(event)">
        <div class="form-group">
          <label class="form-label">Nama Produk *</label>
          <input class="form-control" name="name" required value="${product?.name || ''}">
        </div>
        <div class="form-group">
          <label class="form-label">Kategori *</label>
          <select class="form-control" name="category_id" required>
            <option value="">-- Pilih Kategori --</option>
            ${catOptions}
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Harga (Rp) *</label>
            <input class="form-control" name="price" type="number" min="0" required value="${product?.price || ''}">
          </div>
          <div class="form-group">
            <label class="form-label">Stok *</label>
            <input class="form-control" name="stock" type="number" min="0" required value="${product?.stock ?? ''}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Deskripsi</label>
          <textarea class="form-control" name="description" rows="2">${product?.description || ''}</textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button type="button" class="btn btn-outline" style="flex:1" onclick="closeModal('product-modal')">Batal</button>
          <button type="submit" class="btn btn-primary" style="flex:2">
            ${product ? '💾 Update' : '➕ Tambah'} Produk
          </button>
        </div>
      </form>`;

    showModal('product-modal', product ? `✏️ Edit: ${product.name}` : '➕ Tambah Produk', body);
  }

  async function submitProduct(e) {
    e.preventDefault();
    const form = new FormData(e.target);
    const body = Object.fromEntries(form.entries());
    const btn  = e.target.querySelector('[type=submit]');
    btn.disabled = true;

    try {
      if (editProductId) {
        await API.post(`/products/${editProductId}`, { ...body, _method: 'PUT' });
        toast('Produk diperbarui!', 'success');
      } else {
        await API.post('/products', body);
        toast('Produk ditambahkan!', 'success');
      }
      closeModal('product-modal');
      await loadProducts(searchQ, filterCat);
      renderTable();
    } catch (err) {
      toast(err?.message || 'Gagal menyimpan produk.', 'error');
      btn.disabled = false;
    }
  }

  function confirmDelete(id, name) {
    const body = `
      <p style="margin-bottom:20px">Hapus produk <strong>${name}</strong>? Tindakan ini tidak dapat dibatalkan.</p>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" style="flex:1" onclick="closeModal('delete-modal')">Batal</button>
        <button class="btn btn-danger" style="flex:1" onclick="deleteProduct(${id})">🗑️ Hapus</button>
      </div>`;
    showModal('delete-modal', '⚠️ Hapus Produk?', body);
  }

  async function deleteProduct(id) {
    try {
      await API.delete(`/products/${id}`);
      closeModal('delete-modal');
      toast('Produk dihapus.', 'success');
      await loadProducts(searchQ, filterCat);
      renderTable();
    } catch (err) {
      toast(err?.message || 'Gagal menghapus.', 'error');
    }
  }

  init();
</script>
</body>
</html>
